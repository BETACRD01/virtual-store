<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - NovaStore</title>
  <script type="module" crossorigin src="/virtual-store/assets/auth-login-CUz8A6nt.js"></script>
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/auth.service-BxJS2Ta1.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/validators-_-opS7po.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/notifications-DBxoMB4P.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/dom-Dz1M3mpB.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/auth.guard-D-oprmKr.js">
  <link rel="stylesheet" crossorigin href="/virtual-store/assets/auth-Azh6cvs6.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-title">NovaStore</h1>
      <p class="auth-subtitle">Inicia sesión para continuar</p>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Tu contraseña" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Mostrar contraseña">👁</button>
          </div>
          <div class="form-error" id="password-error"></div>
        </div>
        <div class="form-group" style="text-align:right">
          <a href="./recuperar-password.html" class="auth-link" style="font-size:0.875rem">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Iniciar sesión</button>
      </form>
      <button class="auth-social-btn" id="google-btn">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar con Google
      </button>
      <div class="auth-divider">o</div>
      <p style="text-align:center;font-size:0.875rem;color:var(--color-gray-500)">
        ¿No tienes cuenta? <a href="./registro.html" class="auth-link">Regístrate</a>
      </p>
    </div>
  </div>
</body>
</html>
