<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta - NovaStore</title>
  <script type="module" crossorigin src="/virtual-store/assets/auth-registro-B6-0GDUL.js"></script>
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/auth.service-jTKzoafw.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/validators-_-opS7po.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/notifications-DBxoMB4P.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/dom-Dz1M3mpB.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/auth.guard-BohR-jzd.js">
  <link rel="stylesheet" crossorigin href="/virtual-store/assets/auth-DVs-K_gi.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-subtitle">Completa tus datos para registrarte</p>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="full-name">Nombre completo</label>
          <input type="text" id="full-name" class="form-input" placeholder="Tu nombre" required autocomplete="name">
          <div class="form-error" id="name-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Mostrar contraseña">👁</button>
          </div>
          <div class="form-error" id="password-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="Repite la contraseña" required autocomplete="new-password">
          <div class="form-error" id="confirm-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Crear cuenta</button>
      </form>
      <div class="auth-divider">o</div>
      <p style="text-align:center;font-size:0.875rem;color:var(--color-gray-500)">
        ¿Ya tienes cuenta? <a href="./login.html" class="auth-link">Inicia sesión</a>
      </p>
    </div>
  </div>
</body>
</html>
