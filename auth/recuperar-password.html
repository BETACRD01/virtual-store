<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Recuperar contraseña - NovaStore</title>
  <style>
    .form-input-icon svg { display: block; }

    .auth-back-btn {
      position: absolute;
      top: var(--spacing-sm);
      left: var(--spacing-sm);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      background: var(--color-gray-100);
      color: var(--color-gray-600);
      text-decoration: none;
      transition: all var(--transition);
      z-index: 10;
    }
    .auth-back-btn:hover {
      background: var(--color-gray-200);
      color: var(--color-gray-900);
      transform: translateX(-2px);
    }

    .auth-card {
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent), var(--color-primary));
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-xs);
    }
    .auth-logo svg { flex-shrink: 0; }

    .back-to-login {
      text-align: center;
      font-size: var(--font-size-sm);
      color: var(--color-gray-500);
      margin-top: 1.75rem;
    }
    .back-to-login a {
      font-weight: 600;
      color: var(--color-primary);
      text-decoration: none;
    }
    .back-to-login a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: var(--spacing-xl) var(--spacing-lg); border-radius: var(--radius-xl); }
    }
  </style>
  <script type="module" crossorigin src="/virtual-store/assets/auth-recuperar-password-B8NJFfIk.js"></script>
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/auth.service-BFJLC_vC.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/validators-_-opS7po.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/notifications-DBxoMB4P.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/dom-Dz1M3mpB.js">
  <link rel="stylesheet" crossorigin href="/virtual-store/assets/auth-CaPtOP8q.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <a href="./login.html" class="auth-back-btn" aria-label="Volver a inicio de sesión">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <div class="auth-logo">
        <svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="url(#logo-grad)"/><path d="M12 28V16l8-6 8 6v12h-6v-8h-4v8H12z" fill="#fff"/><defs><linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs></svg>
        <span style="font-size:var(--font-size-xl);font-weight:800;color:var(--color-gray-900);letter-spacing:-0.5px">NovaStore</span>
      </div>
      <p class="auth-subtitle">Te enviaremos un enlace a tu correo</p>
      <form id="recover-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <div style="position:relative">
            <span class="form-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" class="form-input with-icon" placeholder="tu@correo.com" required autocomplete="email">
          </div>
          <div class="form-error" id="email-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Enviar enlace</button>
      </form>
      <div class="back-to-login">
        <a href="./login.html">← Volver a iniciar sesión</a>
      </div>
    </div>
  </div>
</body>
</html>
