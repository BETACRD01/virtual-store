<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Recuperar contraseña - NovaStore</title>
  <script type="module" crossorigin src="/virtual-store/assets/auth-recuperar-password-CeRlpSTD.js"></script>
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/auth.service-BFJLC_vC.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/validators-_-opS7po.js">
  <link rel="modulepreload" crossorigin href="/virtual-store/assets/notifications-DBxoMB4P.js">

  <link rel="stylesheet" crossorigin href="/virtual-store/assets/auth-CaPtOP8q.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-title">Recuperar contraseña</h1>
      <p class="auth-subtitle">Te enviaremos un enlace a tu correo</p>
      <form id="recover-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Enviar enlace</button>
      </form>
      <div class="auth-divider">o</div>
      <p style="text-align:center;font-size:0.875rem">
        <a href="./login.html" class="auth-link">Volver a iniciar sesión</a>
      </p>
    </div>
  </div>
</body>
</html>
