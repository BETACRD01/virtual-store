<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - NovaStore</title>
  <link rel="stylesheet" href="./src/css/global.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-title">Recuperar contraseña</h1>
      <p class="auth-subtitle">Te enviaremos un enlace a tu correo</p>
      <form id="recover-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Enviar enlace</button>
      </form>
      <div class="auth-divider">o</div>
      <p style="text-align:center;font-size:0.875rem">
        <a href="./login.html" class="auth-link">Volver a iniciar sesión</a>
      </p>
    </div>
  </div>
  <script type="module">
    import { authService } from './src/js/services/auth.service.js'
    import { validateEmail } from './src/js/utils/validators.js'
    import { showError, showSuccess } from './src/js/utils/notifications.js'
    import { disableButton, enableButton } from './src/js/utils/dom.js'

    const form = document.getElementById('recover-form')
    const emailInput = document.getElementById('email')
    const emailError = document.getElementById('email-error')
    const submitBtn = document.getElementById('submit-btn')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const err = validateEmail(emailInput.value)
      emailError.textContent = err || ''
      if (err) return
      disableButton(submitBtn)
      try {
        await authService.resetPassword(emailInput.value.trim())
        showSuccess('Revisa tu correo para restablecer tu contraseña.')
        form.innerHTML = '<div class="text-center" style="padding:2rem 0"><p style="font-size:1.125rem;margin-bottom:1rem">📧 Enlace enviado</p><p style="color:var(--color-gray-500)">Revisa tu bandeja de entrada y sigue las instrucciones.</p></div>'
      } catch (err) {
        showError(err.message)
        enableButton(submitBtn)
      }
    })
  </script>
</body>
</html>
