<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle pedido - Admin NovaStore</title>
  <link rel="stylesheet" href="../src/css/global.css">
</head>
<body>
  <div class="admin-layout">
    <aside id="admin-sidebar"></aside>
    <main class="admin-content">
      <a href="pedidos.html" style="color:var(--color-primary);font-size:0.875rem">← Volver a pedidos</a>
      <div id="order-detail" style="margin-top:1rem"><div class="text-center" style="padding:3rem 0"><div class="loading-spinner"></div></div></div>
    </main>
  </div>
  <script type="module">
    import { requireAdmin } from '../src/js/guards/admin.guard.js'
    import { supabase } from '../src/js/config/supabase.js'
    import { formatCurrency } from '../src/js/utils/currency.js'
    import { safeText } from '../src/js/utils/dom.js'
    import { showSuccess, showError } from '../src/js/utils/notifications.js'

    const base = import.meta.env.BASE_URL
    const params = new URLSearchParams(window.location.search)
    const orderId = params.get('id')

    const statusFlow = ['pending', 'confirmed', 'preparing', 'shipped', 'delivered']
    const statusLabels = { pending: 'Pendiente', confirmed: 'Confirmado', preparing: 'Preparando', shipped: 'Enviado', delivered: 'Entregado', cancelled: 'Cancelado' }

    async function loadSidebar() {
      const el = document.getElementById('admin-sidebar')
      el.innerHTML = `<div class="admin-sidebar">
        <div class="admin-sidebar-logo">⚙️ NovaStore</div>
        <a href="${base}admin/">📊 Dashboard</a>
        <a href="${base}admin/productos.html">📦 Productos</a>
        <a href="${base}admin/categorias.html">📂 Categorías</a>
        <a href="${base}admin/pedidos.html" class="active">📋 Pedidos</a>
        <a href="${base}admin/clientes.html">👥 Clientes</a>
        <hr style="border-color:rgba(255,255,255,0.1);margin:1rem 0"><a href="${base}index.html">← Tienda</a><a href="#" id="logout-btn">🚪 Salir</a>
      </div>`
      document.getElementById('logout-btn')?.addEventListener('click', async (e) => { e.preventDefault(); const { authService } = await import('../src/js/services/auth.service.js'); await authService.signOut(); window.location.href = `${base}index.html` })
    }

    async function init() {
      await requireAdmin(); await loadSidebar()
      if (!orderId) { document.getElementById('order-detail').innerHTML = '<p>Pedido no encontrado.</p>'; return }

      const { data: order, error } = await supabase.from('orders').select('*, order_items(*), address:addresses(*), order_status_history(*), profile:user_id(full_name, email, phone)').eq('id', orderId).single()
      if (error) { document.getElementById('order-detail').innerHTML = `<p>Error: ${error.message}</p>`; return }

      const statusClass = s => s === 'delivered' ? 'badge-success' : s === 'cancelled' ? 'badge-danger' : 'badge-warning'
      const statusIdx = statusFlow.indexOf(order.status)
      const nextStatus = statusIdx >= 0 && statusIdx < statusFlow.length - 1 ? statusFlow[statusIdx + 1] : null

      const el = document.getElementById('order-detail')
      el.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem">
          <div>
            <h1 style="font-size:var(--font-size-2xl);font-weight:700">Pedido ${order.order_number}</h1>
            <p style="color:var(--color-gray-500)">${new Date(order.created_at).toLocaleString('es-MX')}</p>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <span class="badge ${statusClass(order.status)}" style="font-size:1rem">${statusLabels[order.status] || order.status}</span>
            ${nextStatus ? `<button class="btn btn-primary btn-sm" id="next-status-btn">Avanzar a ${statusLabels[nextStatus]}</button>` : ''}
            ${(order.status === 'pending' || order.status === 'confirmed') && order.status !== 'cancelled' ? `<button class="btn btn-danger btn-sm" id="cancel-order-btn">Cancelar</button>` : ''}
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem">
          <div class="card" style="padding:var(--spacing-lg)">
            <h3>Cliente</h3>
            <p><strong>${safeText(order.profile?.full_name || '')}</strong><br>${safeText(order.profile?.email || '')}<br>${order.profile?.phone || ''}</p>
          </div>
          ${order.address ? `<div class="card" style="padding:var(--spacing-lg)">
            <h3>Dirección</h3>
            <p><strong>${safeText(order.address.recipient_name)}</strong><br>${safeText(order.address.address_line)}<br>${safeText(order.address.city)}, ${safeText(order.address.province)}<br>${order.address.phone || ''}</p>
          </div>` : ''}
        </div>

        <div class="card" style="padding:var(--spacing-lg);margin-bottom:1.5rem">
          <h3 style="margin-bottom:1rem">Productos</h3>
          ${order.order_items.map(i => `<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--color-gray-100)">
            <div><strong>${safeText(i.product_name)}</strong> <span style="color:var(--color-gray-500)">x${i.quantity}</span></div>
            <div style="text-align:right"><strong>${formatCurrency(i.subtotal)}</strong><br><span style="font-size:0.875rem;color:var(--color-gray-500)">${formatCurrency(i.unit_price)} c/u</span></div>
          </div>`).join('')}
          <div style="display:flex;justify-content:space-between;padding:0.5rem 0;margin-top:0.5rem;border-top:2px solid var(--color-gray-200);font-weight:700;font-size:1.125rem">
            <span>Total</span><span>${formatCurrency(order.total)}</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Notas del administrador</label>
          <textarea class="form-textarea" id="admin-notes" style="min-height:60px">${safeText(order.admin_notes || '')}</textarea>
        </div>

        ${order.order_status_history?.length ? `<div class="card" style="padding:var(--spacing-lg)">
          <h3>Historial</h3>
          ${order.order_status_history.map(h => `<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--color-gray-100);font-size:0.875rem">
            <span>${statusLabels[h.previous_status] || h.previous_status || '—'} → ${statusLabels[h.new_status] || h.new_status}</span>
            <span style="color:var(--color-gray-500)">${new Date(h.created_at).toLocaleString('es-MX')}</span>
          </div>`).join('')}
        </div>` : ''}
      `

      document.getElementById('next-status-btn')?.addEventListener('click', async () => {
        const notes = document.getElementById('admin-notes')?.value || ''
        const { error } = await supabase.rpc('update_order_status', { p_order_id: orderId, p_new_status: nextStatus, p_notes: notes })
        if (error) { showError(error.message); return }
        showSuccess(`Estado actualizado a ${statusLabels[nextStatus]}.`)
        window.location.reload()
      })

      document.getElementById('cancel-order-btn')?.addEventListener('click', async () => {
        if (!confirm('¿Cancelar este pedido?')) return
        const { error } = await supabase.rpc('cancel_order', { p_order_id: orderId })
        if (error) { showError(error.message); return }
        showSuccess('Pedido cancelado.')
        window.location.reload()
      })
    }
    init()
  </script>
</body>
</html>
