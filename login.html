<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - NovaStore</title>
  <link rel="stylesheet" href="./src/css/global.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-title">NovaStore</h1>
      <p class="auth-subtitle">Inicia sesión para continuar</p>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Tu contraseña" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Mostrar contraseña">👁</button>
          </div>
          <div class="form-error" id="password-error"></div>
        </div>
        <div class="form-group" style="text-align:right">
          <a href="./recuperar-password.html" class="auth-link" style="font-size:0.875rem">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Iniciar sesión</button>
      </form>
      <div class="auth-divider">o</div>
      <p style="text-align:center;font-size:0.875rem;color:var(--color-gray-500)">
        ¿No tienes cuenta? <a href="./registro.html" class="auth-link">Regístrate</a>
      </p>
    </div>
  </div>
  <script type="module">
    import { authService } from './src/js/services/auth.service.js'
    import { validateEmail, validateRequired } from './src/js/utils/validators.js'
    import { showError, showSuccess } from './src/js/utils/notifications.js'
    import { disableButton, enableButton } from './src/js/utils/dom.js'
    import { redirectIfAuth } from './src/js/guards/auth.guard.js'

    redirectIfAuth()

    const form = document.getElementById('login-form')
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const emailError = document.getElementById('email-error')
    const passwordError = document.getElementById('password-error')
    const submitBtn = document.getElementById('submit-btn')

    document.getElementById('toggle-password').addEventListener('click', () => {
      const t = passwordInput.type === 'password' ? 'text' : 'password'
      passwordInput.type = t
    })

    function validate() {
      let valid = true
      const e = validateEmail(emailInput.value)
      emailError.textContent = e || ''
      if (e) valid = false
      const p = validateRequired(passwordInput.value, 'La contraseña')
      passwordError.textContent = p || ''
      if (p) valid = false
      return valid
    }

    emailInput.addEventListener('input', () => { if (emailError.textContent) validate() })
    passwordInput.addEventListener('input', () => { if (passwordError.textContent) validate() })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      if (!validate()) return
      disableButton(submitBtn)
      try {
        await authService.signIn({ email: emailInput.value.trim(), password: passwordInput.value })
        showSuccess('Sesión iniciada correctamente.')
        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect') || './index.html'
        window.location.href = redirect
      } catch (err) {
        showError(err.message)
        enableButton(submitBtn)
      }
    })
  </script>
</body>
</html>
