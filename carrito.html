<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - NovaStore</title>
  <link rel="stylesheet" href="./src/css/global.css">
</head>
<body>
  <div class="page-wrapper">
    <header id="main-header"></header>
    <main>
      <div class="page-header">
        <div class="container">
          <h1>Carrito de compras</h1>
          <div class="breadcrumb"><a href="./index.html">Inicio</a> / Carrito</div>
        </div>
      </div>
      <div class="container cart-page">
        <div class="cart-layout">
          <div id="cart-items">
            <div class="text-center" style="padding:3rem 0"><div class="loading-spinner"></div></div>
          </div>
          <div id="cart-summary"></div>
        </div>
      </div>
    </main>
    <footer id="main-footer"></footer>
  </div>
  <script type="module">
    import { loadHeader } from './src/js/components/header.js'
    import { loadFooter } from './src/js/components/footer.js'
    import { cartService } from './src/js/services/cart.service.js'
    import { authService } from './src/js/services/auth.service.js'
    import { formatCurrency } from './src/js/utils/currency.js'
    import { safeText } from './src/js/utils/dom.js'
    import { showSuccess, showError } from './src/js/utils/notifications.js'

    const base = import.meta.env.BASE_URL

    async function init() {
      await loadHeader()
      loadFooter()

      const session = await authService.getSession()
      const userId = session?.user?.id

      async function render() {
        const items = await cartService.getCart(userId)
        const itemsEl = document.getElementById('cart-items')
        const summaryEl = document.getElementById('cart-summary')

        if (!items.length) {
          itemsEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-title">Tu carrito está vacío</div><p>Explora nuestros productos y agrega lo que te guste.</p><a href="./catalogo.html" class="btn btn-primary" style="margin-top:1rem">Ver catálogo</a></div>'
          summaryEl.innerHTML = ''
          return
        }

        itemsEl.innerHTML = items.map(item => {
          const p = item.product || {}
          const price = item.unit_price || p.offer_price || p.price || 0
          return `<div class="card cart-item">
            <img src="${p.main_image_url || ''}" alt="${safeText(p.name)}" class="cart-item-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 fill=%22%23e2e8f0%22><rect width=%22100%22 height=%22100%22/></svg>'">
            <div>
              <div class="cart-item-name"><a href="${base}producto.html?id=${p.id}">${safeText(p.name || 'Producto')}</a></div>
              <div class="cart-item-price">${formatCurrency(price)} c/u</div>
              <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem">
                <div class="quantity-selector" style="height:32px">
                  <button class="qty-btn" data-id="${item.product_id}" data-action="minus" style="width:32px;height:32px;font-size:1rem">−</button>
                  <input type="text" value="${item.quantity}" style="width:40px;height:32px;text-align:center;border:none;border-left:2px solid var(--color-gray-200);border-right:2px solid var(--color-gray-200);font-weight:600;font-size:0.875rem" readonly>
                  <button class="qty-btn" data-id="${item.product_id}" data-action="plus" style="width:32px;height:32px;font-size:1rem">+</button>
                </div>
                <button class="btn btn-sm btn-danger remove-btn" data-id="${item.product_id}" style="margin-left:0.5rem">Eliminar</button>
              </div>
            </div>
            <div class="cart-item-actions">
              <div class="cart-item-subtotal">${formatCurrency(price * item.quantity)}</div>
            </div>
          </div>`
        }).join('')

        const subtotal = items.reduce((s, item) => s + (item.quantity || 1) * (item.unit_price || item.product?.offer_price || item.product?.price || 0), 0)
        const shipping = subtotal > 999 ? 0 : 99
        const total = subtotal + shipping

        summaryEl.innerHTML = `<div class="card cart-summary">
          <h3 style="margin-bottom:1rem">Resumen</h3>
          <div class="cart-summary-row"><span>Subtotal</span><span>${formatCurrency(subtotal)}</span></div>
          <div class="cart-summary-row"><span>Envío</span><span>${shipping === 0 ? 'Gratis' : formatCurrency(shipping)}</span></div>
          ${shipping > 0 ? '<p style="font-size:0.75rem;color:var(--color-gray-500);margin-top:0.25rem">Envío gratis en compras mayores a $999</p>' : ''}
          <div class="cart-summary-row cart-summary-total"><span>Total</span><span>${formatCurrency(total)}</span></div>
          <button class="btn btn-primary btn-block btn-lg" id="checkout-btn" style="margin-top:1rem">Proceder al pago</button>
          <button class="btn btn-secondary btn-block" id="clear-cart-btn" style="margin-top:0.5rem">Vaciar carrito</button>
        </div>`

        document.getElementById('checkout-btn')?.addEventListener('click', () => { window.location.href = `${base}checkout.html` })
        document.getElementById('clear-cart-btn')?.addEventListener('click', async () => { await cartService.clearCart(userId); render(); await loadHeader() })

        document.querySelectorAll('.qty-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id
            const action = btn.dataset.action
            const item = items.find(i => i.product_id === id)
            if (!item) return
            const qty = action === 'plus' ? (item.quantity || 1) + 1 : (item.quantity || 1) - 1
            await cartService.updateQuantity(userId, id, qty)
            render()
          })
        })

        document.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', async () => { await cartService.removeItem(userId, btn.dataset.id); render(); await loadHeader() })
        })
      }

      render()
    }
    init()
  </script>
</body>
</html>
