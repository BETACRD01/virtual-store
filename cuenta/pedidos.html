<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis pedidos - NovaStore</title>
  <link rel="stylesheet" href="../src/css/global.css">
</head>
<body>
  <div class="page-wrapper">
    <header id="main-header"></header>
    <main>
      <div class="container">
        <div class="account-layout">
          <aside id="account-sidebar"></aside>
          <div>
            <h1 style="font-size:var(--font-size-2xl);font-weight:700;margin-bottom:var(--spacing-xl)">Mis pedidos</h1>
            <div id="orders-list"><p style="color:var(--color-gray-500)">Cargando...</p></div>
          </div>
        </div>
      </div>
    </main>
    <footer id="main-footer"></footer>
  </div>
  <script type="module">
    import { loadHeader } from '../src/js/components/header.js'
    import { loadFooter } from '../src/js/components/footer.js'
    import { loadAccountSidebar } from '../src/js/components/account-sidebar.js'
    import { ordersService } from '../src/js/services/orders.service.js'
    import { requireAuth } from '../src/js/guards/auth.guard.js'
    import { formatCurrency } from '../src/js/utils/currency.js'
    import { showError } from '../src/js/utils/notifications.js'

    const base = import.meta.env.BASE_URL
    const statusMap = {
      pending: { label: 'Pendiente', class: 'badge-warning' },
      confirmed: { label: 'Confirmado', class: 'badge-info' },
      preparing: { label: 'Preparando', class: 'badge-info' },
      shipped: { label: 'Enviado', class: 'badge-info' },
      delivered: { label: 'Entregado', class: 'badge-success' },
      cancelled: { label: 'Cancelado', class: 'badge-danger' },
    }

    async function init() {
      const session = await requireAuth()
      if (!session) return
      await loadHeader()
      loadFooter()
      loadAccountSidebar('pedidos')

      try {
        const orders = await ordersService.getMyOrders()
        const el = document.getElementById('orders-list')
        if (!orders.length) {
          el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">Sin pedidos</div><p>Aún no has realizado ninguna compra.</p><a href="../catalogo.html" class="btn btn-primary" style="margin-top:1rem">Ver productos</a></div>'
          return
        }
        el.innerHTML = orders.map(o => {
          const st = statusMap[o.status] || { label: o.status, class: 'badge-info' }
          return `<a href="${base}cuenta/detalle-pedido.html?id=${o.id}" class="card" style="display:block;padding:var(--spacing-lg);margin-bottom:var(--spacing-md);text-decoration:none;color:inherit">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem">
              <div>
                <strong>${o.order_number}</strong>
                <span style="font-size:0.875rem;color:var(--color-gray-500);margin-left:0.5rem">${new Date(o.created_at).toLocaleDateString('es-MX')}</span>
              </div>
              <div style="display:flex;align-items:center;gap:0.75rem">
                <span style="font-weight:700">${formatCurrency(o.total)}</span>
                <span class="badge ${st.class}">${st.label}</span>
              </div>
            </div>
          </a>`
        }).join('')
      } catch (err) { showError(err.message) }
    }
    init()
  </script>
</body>
</html>
