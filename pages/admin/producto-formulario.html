<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Formulario producto - Admin NovaStore</title>
  <link rel="stylesheet" href="../../src/css/global.css">
</head>
<body>
  <div class="admin-layout">
    <aside id="admin-sidebar"></aside>
    <main class="admin-content">
      <div style="margin-bottom:2rem">
        <a href="productos.html" style="color:var(--color-primary);font-size:0.875rem">← Volver a productos</a>
      </div>
      <h1 style="font-size:var(--font-size-2xl);font-weight:700;margin-bottom:var(--spacing-xl)" id="form-title">Nuevo producto</h1>
      <div class="card" style="padding:var(--spacing-xl);max-width:800px">
        <form id="product-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="name">Nombre</label>
            <input type="text" id="name" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="slug">Slug</label>
            <input type="text" id="slug" class="form-input" placeholder="nombre-del-producto" required>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="form-label" for="category">Categoría</label>
              <select id="category" class="form-select" required></select>
            </div>
            <div class="form-group">
              <label class="form-label" for="sku">SKU</label>
              <input type="text" id="sku" class="form-input" required>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="form-label" for="price">Precio</label>
              <input type="number" id="price" class="form-input" min="0.01" step="0.01" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="offer-price">Precio de oferta</label>
              <input type="number" id="offer-price" class="form-input" min="0" step="0.01">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="form-label" for="stock">Stock</label>
              <input type="number" id="stock" class="form-input" min="0" step="1" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="min-stock">Stock mínimo</label>
              <input type="number" id="min-stock" class="form-input" min="0" step="1" value="5">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="description">Descripción</label>
            <textarea id="description" class="form-textarea" rows="4"></textarea>
          </div>
          <div class="form-group" style="display:flex;gap:1rem;align-items:center">
            <label><input type="checkbox" id="featured"> Producto destacado</label>
            <label><input type="checkbox" id="active" checked> Activo</label>
          </div>
          <div class="form-group">
            <label class="form-label">Imagen principal</label>
            <input type="file" id="main-image" accept="image/jpeg,image/png,image/webp">
            <div id="image-preview" style="margin-top:0.5rem"></div>
          </div>
          <div class="form-group" id="extra-images-section" style="display:none">
            <label class="form-label">Imágenes adicionales</label>
            <input type="file" id="extra-images" accept="image/jpeg,image/png,image/webp" multiple>
            <div id="extra-preview" style="display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" id="save-btn">Guardar producto</button>
        </form>
      </div>
    </main>
  </div>
  <script type="module">
    import { requireAdmin } from '../../src/js/guards/admin.guard.js'
    import { supabase } from '../../src/js/config/supabase.js'
    import { storageService } from '../../src/js/services/storage.service.js'
    import { showSuccess, showError } from '../../src/js/utils/notifications.js'
    import { disableButton, enableButton } from '../../src/js/utils/dom.js'

    const base = import.meta.env.BASE_URL
    const params = new URLSearchParams(window.location.search)
    const productId = params.get('id')
    let existingProduct = null

    async function loadSidebar() {
      const el = document.getElementById('admin-sidebar')
      el.innerHTML = `<div class="admin-sidebar">
        <div class="admin-sidebar-logo">⚙️ NovaStore</div>
        <div class="admin-sidebar-section">Menú</div>
        <a href="${base}admin/">📊 Dashboard</a>
        <a href="${base}admin/productos.html" class="active">📦 Productos</a>
        <a href="${base}admin/categorias.html">📂 Categorías</a>
        <a href="${base}admin/pedidos.html">📋 Pedidos</a>
        <a href="${base}admin/clientes.html">👥 Clientes</a>
        <div class="admin-sidebar-section">General</div>
        <a href="${base}index.html">← Ver tienda</a>
        <a href="#" id="logout-btn">🚪 Cerrar sesión</a>
      </div>`
      document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
        e.preventDefault()
        const { authService } = await import('../../src/js/services/auth.service.js')
        await authService.signOut()
        window.location.href = `${base}index.html`
      })
    }

    async function init() {
      await requireAdmin()
      await loadSidebar()

      const { data: cats } = await supabase.from('categories').select('*').order('name')
      const catSelect = document.getElementById('category')
      if (cats) cats.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.name; catSelect.appendChild(o) })

      if (productId) {
        document.getElementById('form-title').textContent = 'Editar producto'
        document.getElementById('extra-images-section').style.display = 'block'
        const { data } = await supabase.from('products').select('*').eq('id', productId).single()
        if (data) {
          existingProduct = data
          document.getElementById('name').value = data.name
          document.getElementById('slug').value = data.slug
          document.getElementById('sku').value = data.sku
          document.getElementById('price').value = data.price
          document.getElementById('offer-price').value = data.offer_price || ''
          document.getElementById('stock').value = data.stock
          document.getElementById('min-stock').value = data.minimum_stock
          document.getElementById('description').value = data.description || ''
          document.getElementById('featured').checked = data.is_featured
          document.getElementById('active').checked = data.is_active
          catSelect.value = data.category_id
          if (data.main_image_url) {
            document.getElementById('image-preview').innerHTML = `<img src="${data.main_image_url}" style="max-width:200px;border-radius:8px">`
          }
        }
      }

      document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const btn = document.getElementById('save-btn')
        disableButton(btn)

        const formData = {
          name: document.getElementById('name').value.trim(),
          slug: document.getElementById('slug').value.trim(),
          category_id: document.getElementById('category').value,
          sku: document.getElementById('sku').value.trim(),
          price: Number(document.getElementById('price').value),
          offer_price: document.getElementById('offer-price').value ? Number(document.getElementById('offer-price').value) : null,
          stock: Number(document.getElementById('stock').value),
          minimum_stock: Number(document.getElementById('min-stock').value),
          description: document.getElementById('description').value.trim(),
          is_featured: document.getElementById('featured').checked,
          is_active: document.getElementById('active').checked,
        }

        try {
          const mainImageFile = document.getElementById('main-image').files[0]
          if (mainImageFile) {
            const url = await storageService.uploadProductImage(mainImageFile, productId || 'temp')
            formData.main_image_url = url
          }

          let result
          if (productId) {
            result = await supabase.from('products').update(formData).eq('id', productId).select().single()
          } else {
            result = await supabase.from('products').insert(formData).select().single()
          }
          if (result.error) throw new Error(result.error.message)

          if (!productId) {
            const newId = result.data.id
            const extraFiles = document.getElementById('extra-images').files
            for (let i = 0; i < extraFiles.length; i++) {
              const url = await storageService.uploadProductImage(extraFiles[i], newId)
              await supabase.from('product_images').insert({ product_id: newId, image_url: url, display_order: i })
            }
          }

          showSuccess(productId ? 'Producto actualizado.' : 'Producto creado.')
          if (!productId) setTimeout(() => { window.location.href = `${base}admin/productos.html` }, 1500)
          enableButton(btn)
        } catch (err) { showError(err.message); enableButton(btn) }
      })
    }
    init()
  </script>
</body>
</html>
