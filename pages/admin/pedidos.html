<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - Admin NovaStore</title>
  <link rel="stylesheet" href="../../src/css/global.css">
</head>
<body>
  <div class="admin-layout">
    <aside id="admin-sidebar"></aside>
    <main class="admin-content">
      <h1 style="font-size:var(--font-size-2xl);font-weight:700;margin-bottom:var(--spacing-xl)">Pedidos</h1>
      <div class="card" style="padding:var(--spacing-lg)">
        <div id="orders-table"><div class="skeleton" style="height:400px"></div></div>
      </div>
    </main>
  </div>
  <script type="module">
    import { requireAdmin } from '../../src/js/guards/admin.guard.js'
    import { supabase } from '../../src/js/config/supabase.js'
    import { formatCurrency } from '../../src/js/utils/currency.js'
    import { safeText } from '../../src/js/utils/dom.js'

    const base = import.meta.env.BASE_URL

    async function loadSidebar() {
      const el = document.getElementById('admin-sidebar')
      el.innerHTML = `<div class="admin-sidebar">
        <div class="admin-sidebar-logo">⚙️ NovaStore</div>
        <div class="admin-sidebar-section">Menú</div>
        <a href="${base}admin/">📊 Dashboard</a>
        <a href="${base}admin/productos.html">📦 Productos</a>
        <a href="${base}admin/categorias.html">📂 Categorías</a>
        <a href="${base}admin/pedidos.html" class="active">📋 Pedidos</a>
        <a href="${base}admin/clientes.html">👥 Clientes</a>
        <div class="admin-sidebar-section">General</div>
        <a href="${base}index.html">← Ver tienda</a>
        <a href="#" id="logout-btn">🚪 Cerrar sesión</a>
      </div>`
      document.getElementById('logout-btn')?.addEventListener('click', async (e) => { e.preventDefault(); const { authService } = await import('../../src/js/services/auth.service.js'); await authService.signOut(); window.location.href = `${base}index.html` })
    }

    async function init() {
      await requireAdmin(); await loadSidebar()
      const { data, error } = await supabase.from('orders').select('*, profile:user_id(full_name)').order('created_at', { ascending: false })
      const el = document.getElementById('orders-table')
      if (error) { el.innerHTML = `<p>Error</p>`; return }
      if (!data?.length) { el.innerHTML = '<div class="empty-state"><p>Sin pedidos.</p></div>'; return }
      const statusClass = s => s === 'delivered' ? 'badge-success' : s === 'cancelled' ? 'badge-danger' : 'badge-warning'
      el.innerHTML = `<div class="table-container"><table>
        <thead><tr><th>Pedido</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody>${data.map(o => `<tr>
          <td><a href="${base}admin/detalle-pedido.html?id=${o.id}" style="color:var(--color-primary)">${o.order_number}</a></td>
          <td>${safeText(o.profile?.full_name || '—')}</td>
          <td>${new Date(o.created_at).toLocaleDateString('es-MX')}</td>
          <td>${formatCurrency(o.total)}</td>
          <td><span class="badge ${statusClass(o.status)}">${o.status}</span></td>
        </tr>`).join('')}</tbody>
      </table></div>`
    }
    init()
  </script>
</body>
</html>
