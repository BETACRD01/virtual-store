<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Crear cuenta - NovaStore</title>
  <link rel="stylesheet" href="../../src/css/global.css">
  <style>
    .form-input-icon svg { display: block; }

    .register-btn {
      margin-top: 0.5rem;
    }

    .login-prompt {
      text-align: center;
      font-size: var(--font-size-sm);
      color: var(--color-gray-500);
      margin-top: 1.75rem;
    }
    .login-prompt a {
      font-weight: 600;
      color: var(--color-primary);
      text-decoration: none;
    }
    .login-prompt a:hover { text-decoration: underline; }

    .auth-back-btn {
      position: absolute;
      top: var(--spacing-md);
      left: var(--spacing-md);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      background: var(--color-gray-100);
      color: var(--color-gray-600);
      text-decoration: none;
      transition: all var(--transition);
      z-index: 1;
    }
    .auth-back-btn:hover {
      background: var(--color-gray-200);
      color: var(--color-gray-900);
      transform: translateX(-2px);
    }

    .auth-card {
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent), var(--color-primary));
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-xs);
    }
    .auth-logo svg { flex-shrink: 0; }

    @media (max-width: 480px) {
      .auth-card { padding: var(--spacing-xl) var(--spacing-lg); border-radius: var(--radius-xl); }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <a href="../index.html" class="auth-back-btn" aria-label="Volver al inicio">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <div class="auth-logo">
        <svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="url(#logo-grad)"/><path d="M12 28V16l8-6 8 6v12h-6v-8h-4v8H12z" fill="#fff"/><defs><linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs></svg>
        <span style="font-size:var(--font-size-xl);font-weight:800;color:var(--color-gray-900);letter-spacing:-0.5px">NovaStore</span>
      </div>
      <p class="auth-subtitle">Crea tu cuenta</p>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="full-name">Nombre completo</label>
          <div style="position:relative">
            <span class="form-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="full-name" class="form-input with-icon" placeholder="Tu nombre" required autocomplete="name">
          </div>
          <div class="form-error" id="name-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <div style="position:relative">
            <span class="form-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" class="form-input with-icon" placeholder="tu@correo.com" required autocomplete="email">
          </div>
          <div class="form-error" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <span class="form-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="password" class="form-input with-icon" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" style="padding-right:2.75rem">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Mostrar contraseña">
              <svg width="18" height="18" id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="form-error" id="password-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <div class="password-wrapper">
            <span class="form-input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="confirm-password" class="form-input with-icon" placeholder="Repite la contraseña" required autocomplete="new-password" style="padding-right:2.75rem">
            <button type="button" class="password-toggle" id="toggle-confirm" aria-label="Mostrar contraseña">
              <svg width="18" height="18" id="eye-icon-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="form-error" id="confirm-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg register-btn" id="submit-btn">Crear cuenta</button>
      </form>
      <div class="login-prompt">
        ¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a>
      </div>
    </div>
  </div>
  <script type="module">
    import { authService } from '../../src/js/services/auth.service.js'
    import { validateEmail, validatePassword, validateRequired } from '../../src/js/utils/validators.js'
    import { showError, showSuccess } from '../../src/js/utils/notifications.js'
    import { disableButton, enableButton } from '../../src/js/utils/dom.js'
    import { redirectIfAuth } from '../../src/js/guards/auth.guard.js'

    redirectIfAuth()

    const form = document.getElementById('register-form')
    const nameInput = document.getElementById('full-name')
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const confirmInput = document.getElementById('confirm-password')
    const nameError = document.getElementById('name-error')
    const emailError = document.getElementById('email-error')
    const passwordError = document.getElementById('password-error')
    const confirmError = document.getElementById('confirm-error')
    const submitBtn = document.getElementById('submit-btn')

    function toggleEye(btnId, iconId, input) {
      const btn = document.getElementById(btnId)
      const icon = document.getElementById(iconId)
      btn.addEventListener('click', () => {
        const isPassword = input.type === 'password'
        input.type = isPassword ? 'text' : 'password'
        icon.innerHTML = isPassword
          ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      })
    }
    toggleEye('toggle-password', 'eye-icon', passwordInput)
    toggleEye('toggle-confirm', 'eye-icon-2', confirmInput)

    function setError(input, errorEl, msg) {
      errorEl.textContent = msg || ''
      input.classList.toggle('error', !!msg)
      return !msg
    }

    function validate() {
      let valid = true
      valid = setError(nameInput, nameError, validateRequired(nameInput.value, 'El nombre')) && valid
      valid = setError(emailInput, emailError, validateEmail(emailInput.value)) && valid
      valid = setError(passwordInput, passwordError, validatePassword(passwordInput.value)) && valid
      if (passwordInput.value !== confirmInput.value) {
        valid = setError(confirmInput, confirmError, 'Las contraseñas no coinciden.') && valid
      } else {
        setError(confirmInput, confirmError, null)
      }
      return valid
    }

    const clearError = (input, errorEl) => () => { if (errorEl.textContent) { errorEl.textContent = ''; input.classList.remove('error') } }
    nameInput.addEventListener('input', clearError(nameInput, nameError))
    emailInput.addEventListener('input', clearError(emailInput, emailError))
    passwordInput.addEventListener('input', clearError(passwordInput, passwordError))
    confirmInput.addEventListener('input', clearError(confirmInput, confirmError))

    nameInput.addEventListener('blur', () => { if (nameInput.value.trim()) setError(nameInput, nameError, validateRequired(nameInput.value, 'El nombre')) })
    emailInput.addEventListener('blur', () => { if (emailInput.value.trim()) setError(emailInput, emailError, validateEmail(emailInput.value)) })
    passwordInput.addEventListener('blur', () => { if (passwordInput.value) setError(passwordInput, passwordError, validatePassword(passwordInput.value)) })
    confirmInput.addEventListener('blur', () => {
      if (confirmInput.value && passwordInput.value !== confirmInput.value) setError(confirmInput, confirmError, 'Las contraseñas no coinciden.')
    })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      if (!validate()) return
      submitBtn.classList.add('btn-loading')
      disableButton(submitBtn)
      try {
        await authService.signUp({ email: emailInput.value.trim(), password: passwordInput.value, fullName: nameInput.value.trim() })
        showSuccess('Cuenta creada. Revisa tu correo para confirmar.')
        setTimeout(() => { window.location.href = './login.html' }, 3000)
      } catch (err) {
        showError(err.message)
        submitBtn.classList.remove('btn-loading')
        enableButton(submitBtn)
      }
    })
  </script>
</body>
</html>
