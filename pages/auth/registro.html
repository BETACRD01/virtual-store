<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Crear cuenta - NovaStore</title>
  <link rel="stylesheet" href="../../src/css/global.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-subtitle">Completa tus datos para registrarte</p>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="full-name">Nombre completo</label>
          <input type="text" id="full-name" class="form-input" placeholder="Tu nombre" required autocomplete="name">
          <div class="form-error" id="name-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Mostrar contraseña">👁</button>
          </div>
          <div class="form-error" id="password-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar contraseña</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="Repite la contraseña" required autocomplete="new-password">
          <div class="form-error" id="confirm-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Crear cuenta</button>
      </form>
      <div class="auth-divider">o</div>
      <p style="text-align:center;font-size:0.875rem;color:var(--color-gray-500)">
        ¿Ya tienes cuenta? <a href="./login.html" class="auth-link">Inicia sesión</a>
      </p>
    </div>
  </div>
  <script type="module">
    import { authService } from '../../src/js/services/auth.service.js'
    import { validateEmail, validatePassword, validateRequired } from '../../src/js/utils/validators.js'
    import { showError, showSuccess } from '../../src/js/utils/notifications.js'
    import { disableButton, enableButton } from '../../src/js/utils/dom.js'
    import { redirectIfAuth } from '../../src/js/guards/auth.guard.js'

    redirectIfAuth()

    const form = document.getElementById('register-form')
    const nameInput = document.getElementById('full-name')
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const confirmInput = document.getElementById('confirm-password')
    const nameError = document.getElementById('name-error')
    const emailError = document.getElementById('email-error')
    const passwordError = document.getElementById('password-error')
    const confirmError = document.getElementById('confirm-error')
    const submitBtn = document.getElementById('submit-btn')

    document.getElementById('toggle-password').addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password'
    })

    function validate() {
      let valid = true
      const n = validateRequired(nameInput.value, 'El nombre')
      nameError.textContent = n || ''; if (n) valid = false
      const e = validateEmail(emailInput.value)
      emailError.textContent = e || ''; if (e) valid = false
      const p = validatePassword(passwordInput.value)
      passwordError.textContent = p || ''; if (p) valid = false
      if (passwordInput.value !== confirmInput.value) {
        confirmError.textContent = 'Las contraseñas no coinciden.'; valid = false
      } else { confirmError.textContent = '' }
      return valid
    }

    form.addEventListener('input', () => { if (nameError.textContent || emailError.textContent || passwordError.textContent || confirmError.textContent) validate() })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      if (!validate()) return
      disableButton(submitBtn)
      try {
        await authService.signUp({ email: emailInput.value.trim(), password: passwordInput.value, fullName: nameInput.value.trim() })
        showSuccess('Cuenta creada. Revisa tu correo para confirmar.')
        setTimeout(() => { window.location.href = './login.html' }, 3000)
      } catch (err) {
        showError(err.message)
        enableButton(submitBtn)
      }
    })
  </script>
</body>
</html>
